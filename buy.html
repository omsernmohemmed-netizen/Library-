<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | كتب للبيع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.93), rgba(26, 37, 47, 0.93)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link {
            align-self: flex-start;
            color: #1abc9c;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }
        .back-link:hover {
            transform: translateX(5px);
            color: #fff;
        }

        h1 { font-size: 32px; color: #1abc9c; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #cbd5e1; margin-bottom: 45px; text-align: center; font-size: 16px; }

        .books-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
        }

        .book-card {
            background-color: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px;
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .book-card:hover {
            border-color: #1abc9c;
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(26, 188, 156, 0.15);
        }

        .book-icon-box {
            width: 100%;
            height: 130px;
            background-color: rgba(26, 188, 156, 0.08);
            border: 1px solid rgba(26, 188, 156, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .book-icon-box i { font-size: 48px; color: #1abc9c; }

        .book-title { font-size: 17px; font-weight: bold; margin-bottom: 6px; color: #fff; }
        .book-author { font-size: 13px; color: #94a3b8; margin-bottom: 15px; }
        .price { font-size: 19px; color: #1abc9c; font-weight: bold; margin-bottom: 15px; }

        .buy-btn {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 11px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .buy-btn:hover { background-color: #16a085; }
    </style>
</head>
<body>

    <section class="hero">
        <div style="width: 100%; max-width: 1100px;">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> الرجوع للرئيسية</a>
        </div>

        <h1>قسم الكتب المعروضة للبيع</h1>
        <p class="subtitle">تصفح واشترِ كتبك المفضلة فوراً وبأفضل الأسعار</p>

        <div class="books-container">
            <!-- كتاب 1 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-book"></i></div>
                    <div class="book-title">رواية أرض زيكولا</div>
                    <div class="book-author">عمرو عبد الحميد</div>
                </div>
                <div style="width: 100%;">
                    <div class="price">50 ر.س</div>
                    <button class="buy-btn" onclick="confirmPurchase('رواية أرض زيكولا')"><i class="fa-solid fa-cart-shopping"></i> شراء الآن</button>
                </div>
            </div>

            <!-- كتاب 2 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-brain"></i></div>
                    <div class="book-title">الأب الغني والأب الفقير</div>
                    <div class="book-author">روبرت كيوساكي</div>
                </div>
                <div style="width: 100%;">
                    <div class="price">75 ر.س</div>
                    <button class="buy-btn" onclick="confirmPurchase('الأب الغني والأب الفقير')"><i class="fa-solid fa-cart-shopping"></i> شراء الآن</button>
                </div>
            </div>

            <!-- كتاب 3 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-code"></i></div>
                    <div class="book-title">مبادئ البرمجة بـ C#</div>
                    <div class="book-author">مطورون محترفون</div>
                </div>
                <div style="width: 100%;">
                    <div class="price">90 ر.س</div>
                    <button class="buy-btn" onclick="confirmPurchase('مبادئ البرمجة بـ C#')"><i class="fa-solid fa-cart-shopping"></i> شراء الآن</button>
                </div>
            </div>

            <!-- كتاب 4 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-lightbulb"></i></div>
                    <div class="book-title">عادات الذات الناجحة</div>
                    <div class="book-author">ستيفن كوفي</div>
                </div>
                <div style="width: 100%;">
                    <div class="price">60 ر.س</div>
                    <button class="buy-btn" onclick="confirmPurchase('عادات الذات الناجحة')"><i class="fa-solid fa-cart-shopping"></i> شراء الآن</button>
                </div>
            </div>

            <!-- كتاب 5 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-globe"></i></div>
                    <div class="book-title">مقدمة في علم البيانات</div>
                    <div class="book-author">د. أحمد علي</div>
                </div>
                <div style="width: 100%;">
                    <div class="price">110 ر.س</div>
                    <button class="buy-btn" onclick="confirmPurchase('مقدمة في علم البيانات')"><i class="fa-solid fa-cart-shopping"></i> شراء الآن</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function confirmPurchase(bookName) {
            alert("🎉 تم الشراء بنجاح لـ: (" + bookName + ") شكراً لتسوقك من مكتبة أسدية!");
        }
    </script>
</body>
</html>
