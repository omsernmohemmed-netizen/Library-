     <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | تواصل معنا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.93), rgba(26, 37, 47, 0.93)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link {
            align-self: flex-start;
            color: #1abc9c;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }
        .back-link:hover {
            transform: translateX(5px);
            color: #fff;
        }

        h1 { font-size: 32px; color: #1abc9c; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #cbd5e1; margin-bottom: 35px; text-align: center; font-size: 16px; }

        /* حاوية الفورم الجذابة المظلمة */
        .contact-card {
            background-color: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 15px;
            color: #cbd5e1;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            background-color: rgba(26, 37, 47, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #1abc9c;
        }

        .submit-btn {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #16a085; }
    </style>
</head>
<body>

    <section class="hero">
        <div style="width: 100%; max-width: 500px;">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> الرجوع للرئيسية</a>
        </div>

        <h1>أرسل استفسارك <i class="fa-solid fa-comments" style="color: #1abc9c;"></i></h1>
        <p class="subtitle">نحن هنا للإجابة على جميع أسئلتك في أي وقت</p>

        <div class="contact-card">
            <form onsubmit="event.preventDefault(); alert('🎉 تم إرسال رسالتك بنجاح! وسنتواصل معك قريباً.');">
                
                <!-- الاسم الكرت -->
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" placeholder="أدخل اسمك الكريم" required>
                </div>

                <!-- البريد أو الهاتف -->
                <div class="form-group">
                    <label>البريد الإلكتروني أو رقم الهاتف:</label>
                    <input type="text" placeholder="لنتمكن من الرد عليك" required>
                </div>

                <!-- نوع الاستفسار -->
                <div class="form-group">
                    <label>نوع الاستفسار:</label>
                    <select>
                        <option>استفسار عام</option>
                        <option>شراء كتب</option>
                        <option>استعارة كتب</option>
                        <option>اقتراح للمكتبة</option>
                    </select>
                </div>

                <!-- التفاصيل -->
                <div class="form-group">
                    <label>تفاصيل الاستفسار:</label>
                    <textarea rows="4" placeholder="اكتب سؤالك أو استفسارك هنا..." required></textarea>
                </div>

                <button type="submit" class="submit-btn"><i class="fa-solid fa-paper-plane"></i> إرسال الآن</button>
            </form>
        </div>
    </section>

</body>
</html>
