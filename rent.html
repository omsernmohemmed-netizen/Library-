<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | كتب للاستعارة</title>
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.92), rgba(26, 37, 47, 0.92)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-link {
            align-self: flex-start;
            color: #1abc9c;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }
        .back-link:hover {
            transform: translateX(5px);
            color: #fff;
        }

        h1 {
            font-size: 30px;
            color: #1abc9c;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 40px;
            text-align: center;
            font-size: 16px;
        }

        .books-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap;
        }

        .book-card {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            width: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .book-card:hover {
            border-color: #1abc9c;
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.12);
        }

        .book-icon-box {
            width: 100%;
            height: 140px;
            background-color: rgba(26, 188, 156, 0.1);
            border: 1px solid rgba(26, 188, 156, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .book-icon-box i {
            font-size: 50px;
            color: #1abc9c;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .book-author {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .duration {
            font-size: 14px;
            color: #cbd5e1;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            width: 100%;
        }

        .rent-btn {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .rent-btn:hover {
            background-color: #16a085;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div style="width: 100%; max-width: 1100px;">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> الرجوع للرئيسية</a>
        </div>

        <h1>قسم استعارة الكتب</h1>
        <p class="subtitle">اختر كتابك المفضل واستعره للقراءة الأسبوعية أو الشهرية</p>

        <div class="books-container">
            <!-- كتاب 1 -->
            <div class="book-card">
                <div style="width: 100%;">
                    <div class="book-icon-box"><i class="fa-solid fa-book-open"></i></div>
                    <div class="book-title">مقدمة ابن خلدون</div>
                    <div class="book-author">ابن خلدون</div>
                </div>
                <div style="width: 100%;">
                    <div class="duration"><i class="fa-regular fa-clock"></i> الاستعارة: حتى 14 يوم</div>
                    <button class="rent-btn"><i class="fa-solid fa-book-reader"></i> طلب استعارة</button>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
