<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | كتب للاستعارة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135px, #0f172a, #111827);
            color: #f8fafc;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .back-btn:hover {
            background: #3498db;
            color: #fff;
            transform: translateX(5px);
        }

        h1 { text-align: center; color: #3498db; margin-bottom: 10px; font-size: 32px; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 40px; }

        .books-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            width: 280px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .book-card:hover {
            transform: translateY(-8px);
            border-color: rgba(52, 152, 219, 0.4);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.15);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            background: linear-gradient(45px, #1e293b, #0f172a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .book-cover i { font-size: 60px; color: #3498db; }

        .book-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #f8fafc; }
        .book-author { font-size: 14px; color: #94a3b8; margin-bottom: 15px; }
        
        .duration-info {
            font-size: 14px;
            color: #e2e8f0;
            background: rgba(52, 152, 219, 0.1);
            padding: 6px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }

        .action-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-btn:hover {
            background: #2980b9;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- زر الرجوع -->
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-right"></i> الرجوع للرئيسية
        </a>

        <h1>قسم استعارة الكتب</h1>
        <p class="subtitle">اختر كتابك المفضل واستعره للقراءة الأسبوعية أو الشهرية</p>

        <div class="books-grid">
            <!-- كتاب 1 -->
            <div class="book-card">
                <div>
                    <div class="book-cover"><i class="fa-solid fa-monument"></i></div>
                    <div class="book-title">مقدمة ابن خلدون</div>
                    <div class="book-author">ابن خلدون</div>
                </div>
                <div>
                    <div class="duration-info"><i class="fa-regular fa-clock"></i> الاستعارة: حتى 14 يوم</div>
                    <button class="action-btn"><i class="fa-solid fa-book-reader"></i> طلب استعارة</button>
                </div>
            </div>

            <!-- كتاب 2 -->
            <div class="book-card">
                <div>
                    <div class="book-cover"><i class="fa-solid fa-flask"></i></div>
                    <div class="book-title">الكون الثقوب السوداء</div>
                    <div class="book-author">ستيفن هوكينج</div>
                </div>
                <div>
                    <div class="duration-info"><i class="fa-regular fa-clock"></i> الاستعارة: حتى 7 أيام</div>
                    <button class="action-btn"><i class="fa-solid fa-book-reader"></i> طلب استعارة</button>
                </div>
            </div>

            <!-- كتاب 3 -->
            <div class="book-card">
                <div>
                    <div class="book-cover"><i class="fa-solid fa-gavel"></i></div>
                    <div class="book-title">قوة العادات</div>
                    <div class="book-author">تشارلز دويج</div>
                </div>
                <div>
                    <div class="duration-info"><i class="fa-regular fa-clock"></i> الاستعارة: حتى 21 يوم</div>
                    <button class="action-btn"><i class="fa-solid fa-book-reader"></i> طلب استعارة</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
