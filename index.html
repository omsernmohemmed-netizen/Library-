    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | الرئيسية</title>
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيق العام للموقع */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        header {
            background-color: #111a22;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #1abc9c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* الخلفية الكبيرة للموقع */
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.93), rgba(26, 37, 47, 0.93)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        /* 2. تنسيق قسم الأقسام الرئيسية */
        .sections-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .sections-container h2 {
            font-size: 26px;
            color: #1abc9c;
            margin-bottom: 25px;
        }

        .grid-menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .menu-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 220px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .menu-card:hover {
            border-color: #1abc9c;
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 20px rgba(26, 188, 156, 0.1);
        }

        .menu-card i {
            font-size: 40px;
            color: #1abc9c;
        }

        .menu-card span {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- الهيدر العلوي للموقع -->
    <header>
        <div class="logo">
            <span>مكتبة أسدية 🦁</span>
        </div>
    </header>

    <!-- منطقة المحتوى البصرية -->
    <section class="hero">
        
        <!-- قسم نبذة عن المكتبة -->
        <div class="about-section">
            <div class="about-icon">
                <i class="fa-solid fa-book-open-reader"></i>

        <!-- أقسام المكتبة الرئيسية -->
        <div class="sections-container">
            <h2>أقسام المكتبة الرئيسية</h2>
            <div class="grid-menu">
                
                <!-- كرت كتب للبيع -->
                <a href="buy.html" class="menu-card">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span>كتب للبيع</span>
                </a>

                <!-- كرت كتب للاستعارة -->
                <a href="rent.html" class="menu-card">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <span>كتب للاستعارة</span>
                </a>

                <!-- كرت نظام التقارير -->
                <a href="Reports.html" class="menu-card">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>نظام التقارير</span>
                </a>

                <!-- كرت تواصل معنا -->
                <a href="contact.html" class="menu-card">
                    <i class="fa-solid fa-envelope"></i>
                    <span>تواصل معنا</span>
                </a>

            </div>
        </div>

    </section>

</body>
</html>
