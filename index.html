<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | الرئيسية</title>
    <!-- استدعاء أيقونات رشيقة ومودرن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إعدادات الخطوط والتصفير */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* غلاف الخلفية السينمائية بنظام الفليكس */
        .main-wrapper {
            background: linear-gradient(135px, rgba(15, 23, 42, 0.96), rgba(26, 37, 47, 0.88)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* هيدر أنيق وبسيط */
        header {
            padding: 35px 20px 10px;
            text-align: center;
        }

        header .logo {
            font-size: 36px;
            font-weight: 800;
            color: #1abc9c;
            text-shadow: 0 0 25px rgba(26, 188, 156, 0.3);
            display: inline-block;
        }

        /* حاوية المحتوى الرئيسية الوسطى */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .content-area h2 {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 45px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* الحاوية الأفقية للأيقونات */
        .menu-grid {
            display: flex;
            flex-direction: row; /* ترتيب أفقي بجانب بعض */
            justify-content: center;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap; /* للنزول تلقائياً في الشاشات الصغيرة لحماية التصميم */
        }

        /* كرت الزجاج الإبداعي المتناسق أفقياً */
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 35px 20px;
            text-decoration: none;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            width: 220px; /* عرض متناسق يضمن بقاء الأزرار متجاورة أفقياً */
            height: 200px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        /* نص عنوان الكرت */
        .card-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* الحاوية الدائرية للأيقونة داخل الكرت */
        .icon-box {
            width: 65px;
            height: 65px;
            background: rgba(26, 188, 156, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            border: 1px solid rgba(26, 188, 156, 0.15);
        }

        .icon-box i {
            font-size: 26px;
            color: #1abc9c;
            transition: all 0.4s ease;
        }

        /* أنيميشن تفاعلي رهيب عند تحريك الماوس أو اللمس (Hover Effects) */
        .premium-card:hover {
            background: rgba(26, 188, 156, 0.07);
            border-color: rgba(26, 188, 156, 0.4);
            transform: translateY(-10px); /* حركة صعود سلسة وفخمة */
            box-shadow: 0 20px 35px rgba(26, 188, 156, 0.18);
            color: #1abc9c;
        }

        .premium-card:hover .icon-box {
            background: #1abc9c;
            box-shadow: 0 0 25px rgba(26, 188, 156, 0.5);
            border-color: #1abc9c;
        }

        .premium-card:hover .icon-box i {
            color: #fff;
            transform: scale(1.15) rotate(-5deg); /* حركة دوران طفيفة ممتعة للعين */
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- الهيدر الفخم المبسط -->
        <header>
            <div class="logo">مكتبة أسدية 🦁</div>
        </header>

        <!-- منطقة الأقسام الرئيسية -->
        <div class="content-area">
            <h2>بوابتك للتحكم وإدارة الأقسام</h2>
            
            <!-- شبكة الأزرار الأفقية الجذابة -->
            <div class="menu-grid">
                
                <!-- كرت كتب للبيع -->
                <a href="buy.html" class="premium-card">
                    <div class="icon-box">
                        <i class="fa-solid fa-basket-shopping"></i>
                    </div>
                    <span class="card-title">كتب للبيع</span>
                </a>
                
                <!-- كرت كتب للاستعارة -->
                <a href="rent.html" class="premium-card">
                    <div class="icon-box">
                        <i class="fa-solid fa-book-reader"></i>
                    </div>
                    <span class="card-title">كتب للاستعارة</span>
                </a>

                <!-- كرت نظام التقارير - متوافق مع اسم ملفك Reports.html -->
                <a href="Reports.html" class="premium-card">
                    <div class="icon-box">
                        <i class="fa-solid fa-chart-pie"></i>
                    </div>
                    <span class="card-title">نظام التقارير</span>
                </a>
                
                <!-- كرت تواصل معنا -->
                <a href="contact.html" class="premium-card">
                    <div class="icon-box">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <span class="card-title">استفسارات وتواصل</span>
                </a>
                
            </div>
        </div>
    </div>

</body>
</html>
