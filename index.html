<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f9fa;
            overflow: hidden; /* لمنع التمرير لأن الصفحة لوحة تحكم ثابتة */
        }

        header {
            background-color: #1a252f;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1abc9c;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }

        /* جعل الخلفية بكامل الشاشة والأيقونات في المنتصف */
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.85)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            height: calc(100vh - 64px); /* تأخذ باقي الطول بعد الهيدر */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .hero h1 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #1abc9c;
        }

        .icon-navigation {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px; /* لتبدو متناسقة ومصطفة عمودياً مثل الصورة */
        }

        .nav-card {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .nav-card i {
            font-size: 35px;
            color: #1abc9c;
        }

        .nav-card span {
            font-size: 18px;
            font-weight: bold;
        }

        .nav-card:hover {
            background-color: #1abc9c;
            border-color: #1abc9c;
            transform: translateY(-3px);
        }

        .nav-card:hover i {
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">مكتبة أسدية 🦁</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="buy.html">شراء كتب</a>
            <a href="rent.html">استعارة كتب</a>
        </nav>
    </header>

    <section class="hero">
        <h1>أقسام المكتبة</h1>
        
        <div class="icon-navigation">
            <!-- الربط مع الصفحات الجديدة -->
            <a href="buy.html" class="nav-card">
                <i class="fa-solid fa-basket-shopping"></i>
                <span>كتب للبيع</span>
            </a>
            <a href="rent.html" class="nav-card">
                <i class="fa-solid fa-book-reader"></i>
                <span>كتب للاستعارة</span>
            </a>
            <a href="contact.html" class="nav-card">
                <i class="fa-solid fa-envelope"></i>
                <span>تواصل معنا</span>
            </a>
        </div>
    </section>

</body>
</html>
