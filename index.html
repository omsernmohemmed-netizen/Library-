    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | الرئيسية</title>
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيق العام للموقع */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        /* تنسيق الشعار الاحترافي */
.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    user-select: none;
}

.logo-icon {
    position: relative;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #1abc9c, #16a085);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(26, 188, 156, 0.3);
}

.logo-icon i {
    font-size: 22px;
    color: #fff;
}

.lion-crown {
    position: absolute;
    top: -8px;
    right: -8px;
    font-size: 18px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.logo-text {
    display: flex;
    flex-direction: column;
}

.main-title {
    font-size: 20px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.sub-title {
    font-size: 11px;
    color: #1abc9c;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
}

        /* الخلفية الكبيرة للموقع */
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.93), rgba(26, 37, 47, 0.93)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        /* 2. تنسيق قسم الأقسام الرئيسية */
        .sections-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .sections-container h2 {
            font-size: 26px;
            color: #1abc9c;
            margin-bottom: 25px;
        }

        .grid-menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .menu-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 220px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .menu-card:hover {
            border-color: #1abc9c;
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 20px rgba(26, 188, 156, 0.1);
        }

        .menu-card i {
            font-size: 40px;
            color: #1abc9c;
        }

        .menu-card span {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- الهيدر العلوي للموقع -->
    <!-- الهيدر المطور مع الشعار الفخم -->
<header>
    <div class="logo-container">
        <div class="logo-icon">
            <i class="fa-solid fa-book-open"></i>
            <span class="lion-crown">🦁</span>
        </div>
        <div class="logo-text">
            <span class="main-title">مَكْتَبَة أَسَدِيَّة</span>
            <span class="sub-title">عرين المعرفة والثقافة</span>
        </div>
    </div>
</header>


    <!-- منطقة المحتوى البصرية -->
    <section class="hero">
        
        <!-- قسم نبذة عن المكتبة -->
        <div class="about-section">
            <div class="about-icon">
                <i class="fa-solid fa-book-open-reader"></i>

        <!-- أقسام المكتبة الرئيسية -->
        <div class="sections-container">
            <h2>أقسام المكتبة الرئيسية</h2>
            <div class="grid-menu">
                
                <!-- كرت كتب للبيع -->
                <a href="buy.html" class="menu-card">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span>كتب للبيع</span>
                </a>

                <!-- كرت كتب للاستعارة -->
                <a href="rent.html" class="menu-card">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <span>كتب للاستعارة</span>
                </a>

                <!-- كرت نظام التقارير -->
                <a href="Reports.html" class="menu-card">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>نظام التقارير</span>
                </a>

                <!-- كرت تواصل معنا -->
                <a href="contact.html" class="menu-card">
                    <i class="fa-solid fa-envelope"></i>
                    <span>تواصل معنا</span>
                </a>

            </div>
        </div>

    </section>

</body>
</html>
