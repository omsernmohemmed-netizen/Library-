<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            overflow-x: hidden;
        }

        /* هيدر بسيط ونظيف جداً بلمسة التنسيق الأول */
        header {
            background-color: #1a252f;
            color: #fff;
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header .logo {
            font-size: 28px;
            font-weight: bold;
            color: #1abc9c;
            margin: 0;
        }

        /* الخلفية المريحة للعين */
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.85)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: calc(100vh - 82px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .hero h1 {
            font-size: 30px;
            margin-bottom: 40px;
            color: #1abc9c;
            font-weight: 600;
        }

        /* الحاوية الأفقية النظيفة بجانب بعض */
        .icon-navigation {
            display: flex;
            flex-direction: row; /* توزيع أفقي */
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap; /* يتجاوب تلقائياً مع الموبايل */
        }

        /* تصميم الكرت النظيف من التنسيق الأول */
        .nav-card {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 25px 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 200px; /* عرض ثابت ومتناسق أفقي */
            height: 160px;
            backdrop-filter: blur(5px);
        }

        .nav-card i {
            font-size: 36px;
            color: #1abc9c;
            transition: color 0.3s ease;
        }

        .nav-card span {
            font-size: 16px;
            font-weight: bold;
        }

        /* تأثير الحركة البسيط والنظيف عند التمرير */
        .nav-card:hover {
            background-color: #1abc9c;
            border-color: #1abc9c;
            transform: translateY(-4px);
        }

        .nav-card:hover i {
            color: white;
        }
    </style>
</head>
<body>

    <!-- الهيدر النظيف الأول -->
    <header>
        <h1 class="logo">مكتبة أسدية 🦁</h1>
    </header>

    <!-- شاشة التحكم الأفقية -->
    <section class="hero">
        <h1>أقسام المكتبة الرئيسية</h1>
        
        <div class="icon-navigation">
            <!-- كتب للبيع -->
            <a href="buy.html" class="nav-card">
                <i class="fa-solid fa-basket-shopping"></i>
                <span>كتب للبيع</span>
            </a>
            
            <!-- كتب للاستعارة -->
            <a href="rent.html" class="nav-card">
                <i class="fa-solid fa-book-reader"></i>
                <span>كتب للاستعارة</span>
            </a>

            <!-- نظام التقارير متوافق مع Reports.html -->
            <a href="Reports.html" class="nav-card">
                <i class="fa-solid fa-chart-bar"></i>
                <span>نظام التقارير</span>
            </a>
            
            <!-- تواصل معنا -->
            <a href="contact.html" class="nav-card">
                <i class="fa-solid fa-envelope"></i>
                <span>تواصل معنا</span>
            </a>
        </div>
    </section>

</body>
</html>
