  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أسدية | نظام التقارير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            color: #fff;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.93), rgba(26, 37, 47, 0.93)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .report-title h1 {
            font-size: 28px;
            color: #1abc9c;
            margin: 0 0 5px 0;
        }

        .report-title p {
            color: #cbd5e1;
            margin: 0;
            font-size: 14px;
        }

        .actions-btn {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: none;
            transition: all 0.3s;
        }

        .btn-main { background-color: #1abc9c; color: white; }
        .btn-main:hover { background-color: #16a085; }
        
        .btn-secondary { background-color: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.2); }

        /* حاوية كروت الإحصائيات */
        .stats-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
        }

        .stat-card {
            background-color: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 25px;
            width: 250px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #1abc9c;
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 40px;
            color: #1abc9c;
            margin-bottom: 15px;
        }

        .stat-card .label {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

    <section class="hero">
        <!-- الهيدر الخاص بالتقرير -->
        <div class="header-container">
            <div class="report-title">
                <h1>تقرير حركة مكتبة أسدية 🦁</h1>
                <p>تاريخ الاستخراج: يوليو 2026</p>
            </div>
            <div class="actions-btn">
                <button class="btn btn-main" onclick="window.print()"><i class="fa-solid fa-print"></i> طباعة التقرير</button>
                <a href="index.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> الرئيسية</a>
            </div>
        </div>

        <!-- الكروت الإحصائية الجذابة -->
        <div class="stats-grid">
            <!-- كرت 1 -->
            <div class="stat-card">
                <i class="fa-solid fa-book"></i>
                <div class="label">إجمالي الكتب المباعة</div>
                <div class="value">142 كتاب</div>
            </div>

            <!-- كرت 2 -->
            <div class="stat-card">
                <i class="fa-solid fa-retweet"></i>
                <div class="label">إجمالي الكتب المستعارة</div>
                <div class="value">89 كتاب</div>
            </div>

            <!-- كرت 3 -->
            <div class="stat-card">
                <i class="fa-solid fa-users"></i>
                <div class="label">الزوار هذا الشهر</div>
                <div class="value">540 زائر</div>
            </div>
        </div>
    </section>

</body>
</html>
